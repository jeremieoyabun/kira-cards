<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c850ff"/>
      <stop offset="25%" stop-color="#4d9fff"/>
      <stop offset="50%" stop-color="#50ddb6"/>
      <stop offset="75%" stop-color="#ffe150"/>
      <stop offset="100%" stop-color="#ff6b8a"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="128" y="56" width="256" height="400" rx="18"/>
    </clipPath>
  </defs>
  <!-- Card outline -->
  <rect x="128" y="56" width="256" height="400" rx="18" stroke="url(#holo)" stroke-width="8" fill="none"/>
  <!-- Holo foil corner (top-right diagonal) -->
  <polygon points="280,56 384,56 384,176" fill="url(#holo)" opacity="0.2" clip-path="url(#card-clip)"/>
  <line x1="280" y1="56" x2="384" y2="176" stroke="url(#holo)" stroke-width="4" opacity="0.5"/>
  <!-- Sparkle glint at corner intersection -->
  <g transform="translate(348, 88)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="url(#holo)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#holo)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="url(#holo)" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="url(#holo)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
