    <line x1="-4" y1="-4" x2="4" y2="4" stroke="url(#holo)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="url(#holo)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="118" font-family="'Unbounded','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="56" letter-spacing="8" fill="#ffffff">KIRA</text>
  <text x="200" y="168" font-family="'Unbounded','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="40" letter-spacing="12" fill="url(#holo)">CARDS</text>
